<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <form method="post" class="bg-white p-8 rounded-lg shadow w-80 space-y-4">
        {% csrf_token %}
        <h1 class="text-xl font-bold text-center">Sagra Lancenigo - Login</h1>
        {% if form.errors %}<p class="text-red-600 text-sm text-center">Credenziali non valide</p>{% endif %}
        <input name="username" placeholder="Username" class="w-full px-3 py-2 border rounded" required>
        <input name="password" type="password" placeholder="Password" class="w-full px-3 py-2 border rounded" required>
        <button class="w-full py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Accedi</button>
    </form>
</body>
</html>
